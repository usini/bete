name: Desktop release (Windows)

# Triggered by pushing a tag like "desktop-v0.2.0" (bump the version in
# desktop/src-tauri/tauri.conf.json + Cargo.toml first). Builds the Tauri app,
# publishes a signed NSIS installer + updater manifest (latest.json) to a
# GitHub Release, which js/update.js then polls for in-app auto-update.
on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch: {}

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install desktop wrapper dependencies
        working-directory: desktop
        run: npm ci

      - name: Sync static frontend files into desktop/dist
        working-directory: desktop
        run: npm run sync

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Bete Desktop ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: false

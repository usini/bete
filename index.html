<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bete</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230d0f12'/%3E%3Crect x='3' y='5' width='10' height='6' fill='none' stroke='%2339ff14' stroke-width='2'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="board"></canvas>
  <canvas id="minimap"></canvas>

  <!-- Text editing overlay -->
  <textarea id="editor" spellcheck="false"></textarea>
  <button id="editDone" type="button">✓ OK</button>

  <!-- Radial menu (right click) -->
  <div id="radial" class="radial hidden"></div>

  <!-- Color palette -->
  <div id="palette" class="palette hidden"></div>

  <!-- Settings button -->
  <button id="settingsbtn" type="button" data-i18n-title="button.settings" data-i18n-aria="button.settings">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5 5l2.1 2.1M16.9 16.9 19 19M19 5l-2.1 2.1M7.1 16.9 5 19"/></svg>
  </button>

  <!-- Mic button (voice chat): visible only while in a liaison -->
  <button id="voicebtn" type="button" class="hidden" data-i18n-title="button.mic.title" data-i18n-aria="button.mic.aria">
    <svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5.5 11a6.5 6.5 0 0 0 13 0"/><line x1="12" y1="17.5" x2="12" y2="21"/><line x1="8.5" y1="21" x2="15.5" y2="21"/></svg>
  </button>

  <!-- Speaker button (mute/unmute listening): visible while in a liaison -->
  <button id="speakerbtn" type="button" class="hidden" data-i18n-title="button.listen.title" data-i18n-aria="button.listen.aria">
    <svg viewBox="0 0 24 24"><polygon points="4,9 8,9 13,5 13,19 8,15 4,15"/><path class="spk-on" d="M16.5 8.5a5 5 0 0 1 0 7"/><line class="spk-off" x1="16" y1="9" x2="21" y2="14"/><line class="spk-off" x1="21" y1="9" x2="16" y2="14"/></svg>
  </button>

  <!-- "Who's talking" banner (top center) -->
  <div id="speakers"></div>

  <!-- Hint (top-left corner) -->
  <div id="hint" data-i18n-html="hint.default"></div>

  <!-- Selection rectangle (marquee) -->
  <div id="marquee"></div>

  <!-- Settings panel -->
  <div id="settings" class="hidden"></div>

  <!-- Board name (top center) -->
  <div id="boardname"></div>

  <!-- Active liaison indicator (top center, below the name) -->
  <div id="liaisonbadge"></div>

  <!-- Board picker (link to a board) -->
  <div id="boardpicker" class="hidden"></div>

  <!-- Image popup (double-click / double-tap on an image block) -->
  <div id="imgpopup"><img alt="" /></div>

  <!-- Status toast (P2P sync) -->
  <div id="toast"></div>

  <!-- Reconnect-loop warning: shown when the liaison keeps flapping, offers a refresh -->
  <div id="reconnectpopup" class="hidden">
    <div class="rp-card">
      <div class="rp-title" data-i18n="reconnect.title"></div>
      <div class="rp-msg" data-i18n="reconnect.loopMessage"></div>
      <div class="rp-actions">
        <button id="reconnectRefresh" class="rp-refresh" data-i18n="reconnect.refresh"></button>
        <button id="reconnectDismiss" class="rp-dismiss" data-i18n="reconnect.dismiss"></button>
      </div>
    </div>
  </div>

  <!-- Desktop-only: new version available, offers to install (js/update.js) -->
  <div id="updatepopup" class="hidden">
    <div class="rp-card">
      <div class="rp-title" data-i18n="update.title"></div>
      <div class="rp-msg up-msg"></div>
      <div class="rp-msg up-status"></div>
      <div class="rp-actions">
        <button class="rp-refresh up-install" data-i18n="update.install"></button>
        <button class="rp-dismiss up-later" data-i18n="update.later"></button>
      </div>
    </div>
  </div>

  <!-- Liaison type indicator (direct P2P / TURN relay) -->
  <div id="netmode"></div>

  <!-- URL bar of a focused link (click to open) -->
  <div id="linkbar"></div>

  <!-- Hidden file input for import -->
  <input id="fileInput" type="file" accept="application/json,.json" hidden />

  <!-- Hidden file inputs for images: plain picker vs. direct camera capture
       (radial menu > Image / Camera). No "capture" attribute = regular
       file/gallery picker on every platform; "capture=environment" jumps
       straight to the phone's camera app on mobile (ignored on desktop,
       falls back to a normal file picker there). -->
  <input id="imageFileInput" type="file" accept="image/*" hidden />
  <input id="imageCameraInput" type="file" accept="image/*" capture="environment" hidden />

  <!-- CRT scanlines overlay -->
  <div id="crt"></div>

  <script type="module" src="js/main.js?v=mr7mutc2"></script>
</body>
</html>

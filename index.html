<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>TODOMAPPA</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230d0f12'/%3E%3Crect x='3' y='5' width='10' height='6' fill='none' stroke='%2339ff14' stroke-width='2'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="board"></canvas>
  <canvas id="minimap"></canvas>

  <!-- Overlay d'édition de texte -->
  <textarea id="editor" spellcheck="false"></textarea>
  <button id="editDone" type="button">✓ OK</button>

  <!-- Menu radial (clic droit) -->
  <div id="radial" class="radial hidden"></div>

  <!-- Palette de couleurs -->
  <div id="palette" class="palette hidden"></div>

  <!-- Bouton Paramètres -->
  <button id="settingsbtn" type="button" title="Paramètres" aria-label="Paramètres">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5 5l2.1 2.1M16.9 16.9 19 19M19 5l-2.1 2.1M7.1 16.9 5 19"/></svg>
  </button>

  <!-- Astuce coin haut-gauche -->
  <div id="hint">CLIC DROIT&nbsp;/&nbsp;APPUI LONG&nbsp;=&nbsp;MENU</div>

  <!-- Rectangle de sélection (marquee) -->
  <div id="marquee"></div>

  <!-- Panneau Paramètres -->
  <div id="settings" class="hidden"></div>

  <!-- Nom du board (haut centre) -->
  <div id="boardname"></div>

  <!-- Indicateur de liaison active (haut centre, sous le nom) -->
  <div id="liaisonbadge"></div>

  <!-- Sélecteur de board (lien vers un board) -->
  <div id="boardpicker" class="hidden"></div>

  <!-- Popup d'image (double-clic / double-tap sur un rectangle-image) -->
  <div id="imgpopup"><img alt="" /></div>

  <!-- Toast de statut (synchro P2P) -->
  <div id="toast"></div>

  <!-- Indicateur de type de liaison (P2P direct / relais TURN) -->
  <div id="netmode"></div>

  <!-- Barre d'URL d'un lien focalisé (clic pour ouvrir) -->
  <div id="linkbar"></div>

  <!-- Input fichier caché pour l'import -->
  <input id="fileInput" type="file" accept="application/json,.json" hidden />

  <!-- Overlay scanlines CRT -->
  <div id="crt"></div>

  <script type="module" src="js/main.js?v=mqwspf0j"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bete</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230d0f12'/%3E%3Crect x='3' y='5' width='10' height='6' fill='none' stroke='%2339ff14' stroke-width='2'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="board"></canvas>
  <canvas id="minimap"></canvas>

  <!-- Overlay d'édition de texte -->
  <textarea id="editor" spellcheck="false"></textarea>
  <button id="editDone" type="button">✓ OK</button>

  <!-- Menu radial (clic droit) -->
  <div id="radial" class="radial hidden"></div>

  <!-- Palette de couleurs -->
  <div id="palette" class="palette hidden"></div>

  <!-- Bouton Paramètres -->
  <button id="settingsbtn" type="button" title="Paramètres" aria-label="Paramètres">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5 5l2.1 2.1M16.9 16.9 19 19M19 5l-2.1 2.1M7.1 16.9 5 19"/></svg>
  </button>

  <!-- Bouton micro (chat vocal) : visible seulement en liaison -->
  <button id="voicebtn" type="button" class="hidden" title="Micro : parler (l'écoute est automatique)" aria-label="Micro parler">
    <svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5.5 11a6.5 6.5 0 0 0 13 0"/><line x1="12" y1="17.5" x2="12" y2="21"/><line x1="8.5" y1="21" x2="15.5" y2="21"/></svg>
  </button>

  <!-- Bouton haut-parleur (couper/activer l'écoute) : visible en liaison -->
  <button id="speakerbtn" type="button" class="hidden" title="Écoute (haut-parleur)" aria-label="Écoute">
    <svg viewBox="0 0 24 24"><polygon points="4,9 8,9 13,5 13,19 8,15 4,15"/><path class="spk-on" d="M16.5 8.5a5 5 0 0 1 0 7"/><line class="spk-off" x1="16" y1="9" x2="21" y2="14"/><line class="spk-off" x1="21" y1="9" x2="16" y2="14"/></svg>
  </button>

  <!-- Bandeau "qui parle" (haut centre) -->
  <div id="speakers"></div>

  <!-- Astuce coin haut-gauche -->
  <div id="hint">CLIC DROIT&nbsp;/&nbsp;APPUI LONG&nbsp;=&nbsp;MENU</div>

  <!-- Rectangle de sélection (marquee) -->
  <div id="marquee"></div>

  <!-- Panneau Paramètres -->
  <div id="settings" class="hidden"></div>

  <!-- Nom du board (haut centre) -->
  <div id="boardname"></div>

  <!-- Indicateur de liaison active (haut centre, sous le nom) -->
  <div id="liaisonbadge"></div>

  <!-- Sélecteur de board (lien vers un board) -->
  <div id="boardpicker" class="hidden"></div>

  <!-- Popup d'image (double-clic / double-tap sur un rectangle-image) -->
  <div id="imgpopup"><img alt="" /></div>

  <!-- Toast de statut (synchro P2P) -->
  <div id="toast"></div>

  <!-- Indicateur de type de liaison (P2P direct / relais TURN) -->
  <div id="netmode"></div>

  <!-- Barre d'URL d'un lien focalisé (clic pour ouvrir) -->
  <div id="linkbar"></div>

  <!-- Input fichier caché pour l'import -->
  <input id="fileInput" type="file" accept="application/json,.json" hidden />

  <!-- Overlay scanlines CRT -->
  <div id="crt"></div>

  <script type="module" src="js/main.js?v=mr1urypt"></script>
</body>
</html>
